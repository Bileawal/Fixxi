name: fixxi
description: Fixxi - Home repair & technician booking (FYP)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.2
  dio: ^5.7.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png
  adaptive_icon_background: "#F57C00"
  adaptive_icon_foreground: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
